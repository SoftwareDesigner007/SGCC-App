name: sgcc_app
description: SGCC – Shree Ganesh Computer Classes Official App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  flutter_animate: ^4.5.2
  permission_handler: ^11.3.1
  google_generative_ai: ^0.4.0
  flutter_tts: ^3.8.5
  share_plus: ^10.1.3
  font_awesome_flutter: ^10.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Logo.png"
  min_sdk_android: 21
  # No adaptive icon — keeps the pre-rendered curved square shape as-is on all devices

flutter_native_splash:
  color: "#0A1320"
  image: "assets/images/Logo.png"
  android_12:
    image: "assets/images/Logo.png"
    color: "#0A1320"
    icon_background_color: "#0A1320"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
